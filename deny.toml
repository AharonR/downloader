# cargo-deny configuration
# https://embarkstudios.github.io/cargo-deny/

# ---------------------------------------------------------------------------
# [advisories] — security advisory database
# ---------------------------------------------------------------------------
[advisories]
version = 2
# Accepted advisories with rationale (mirrors .cargo/audit.toml):
#
# RUSTSEC-2023-0071: rsa Marvin Attack timing sidechannel (medium, 5.9).
# No patched version available. Transitive via sqlx-mysql which is unused at
# runtime; rsa is never invoked in any execution path.
#
# RUSTSEC-2025-0119: number_prefix unmaintained (warning only, no CVE).
# Transitive via indicatif progress bars. No security impact.
ignore = [
    { id = "RUSTSEC-2023-0071", reason = "Transitive via sqlx-mysql (unused at runtime); no rsa invocation path exists" },
    { id = "RUSTSEC-2025-0119", reason = "Unmaintained warning only — transitive via indicatif; no CVE, no security impact" },
    # Tauri transitive deps — GTK3 bindings unmaintained, no replacements available upstream
    { id = "RUSTSEC-2024-0411", reason = "Unmaintained — gdkwayland-sys transitive via Tauri/tao; no replacement available" },
    { id = "RUSTSEC-2024-0412", reason = "Unmaintained — gdk transitive via Tauri; no replacement available" },
    { id = "RUSTSEC-2024-0413", reason = "Unmaintained — atk transitive via Tauri; no replacement available" },
    { id = "RUSTSEC-2024-0414", reason = "Unmaintained — gdkx11-sys transitive via Tauri; no replacement available" },
    { id = "RUSTSEC-2024-0415", reason = "Unmaintained — gtk transitive via Tauri; no replacement available" },
    { id = "RUSTSEC-2024-0416", reason = "Unmaintained — atk-sys transitive via Tauri; no replacement available" },
    { id = "RUSTSEC-2024-0417", reason = "Unmaintained — gdkx11 transitive via Tauri; no replacement available" },
    { id = "RUSTSEC-2024-0418", reason = "Unmaintained — gdk-sys transitive via Tauri; no replacement available" },
    { id = "RUSTSEC-2024-0419", reason = "Unmaintained — gtk3-macros transitive via Tauri; no replacement available" },
    { id = "RUSTSEC-2024-0420", reason = "Unmaintained — gtk-sys transitive via Tauri; no replacement available" },
    { id = "RUSTSEC-2024-0429", reason = "Unsoundness in glib VariantStrIter — transitive via Tauri; VariantStrIter not used in any app code path" },
    { id = "RUSTSEC-2024-0370", reason = "Unmaintained — proc-macro-error transitive via gtk3-macros/Tauri; no CVE, no security impact" },
    # Tauri transitive deps — unic crates unmaintained, no replacements available
    { id = "RUSTSEC-2025-0057", reason = "Unmaintained — fxhash transitive via Tauri/kuchikiki; no CVE, no security impact" },
    { id = "RUSTSEC-2025-0075", reason = "Unmaintained — unic-char-range transitive via Tauri; no CVE, no security impact" },
    { id = "RUSTSEC-2025-0080", reason = "Unmaintained — unic-common transitive via Tauri; no CVE, no security impact" },
    { id = "RUSTSEC-2025-0081", reason = "Unmaintained — unic-char-property transitive via Tauri; no CVE, no security impact" },
    { id = "RUSTSEC-2025-0098", reason = "Unmaintained — unic-ucd-version transitive via Tauri; no CVE, no security impact" },
    { id = "RUSTSEC-2025-0100", reason = "Unmaintained — unic-ucd-ident transitive via Tauri; no CVE, no security impact" },
    # rand 0.7.3 / 0.8.5 remain as Tauri build-time deps (phf_generator/phf_macros for compile-time
    # hash tables). They never call rand::rng() from a logger context and are not invoked at runtime.
    # All runtime paths use rand >= 0.9.3 which is patched.
    { id = "RUSTSEC-2026-0097", reason = "Affected rand 0.7.3/0.8.5 are Tauri build-time deps only; no runtime exposure. Runtime code uses patched rand 0.9.3." },
]

# ---------------------------------------------------------------------------
# [licenses] — allowed open-source licenses
# ---------------------------------------------------------------------------
[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "Zlib",
    "CC0-1.0",
    "OpenSSL",
    "Unicode-3.0",
    "CDLA-Permissive-2.0",
]

# ---------------------------------------------------------------------------
# [bans] — duplicate dependency and wildcard version bans
# ---------------------------------------------------------------------------
[bans]
# Lint level for when multiple versions of the same crate are detected.
multiple-versions = "warn"
# Lint level for when a crate version requirement is `*`.
wildcards = "allow"
# Highlight packages meeting at least one of these criteria:
highlight = "all"

# ---------------------------------------------------------------------------
# [sources] — allowed crate registries
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
